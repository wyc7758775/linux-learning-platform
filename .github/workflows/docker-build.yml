name: Build and Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/linux-learning-frontend
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/linux-learning-backend
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/linux-learning-level
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push frontend
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/linux-learning-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push backend
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/linux-learning-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push level image
      - name: Build and push level image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.level
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/linux-learning-level:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
