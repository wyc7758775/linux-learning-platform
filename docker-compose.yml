version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker:/app/docker:ro
      - db-data:/app/data
    environment:
      - PORT=3001
      - DOCKERFILE_PATH=/app/docker
      - DB_PATH=/app/data/data.db
    depends_on:
      - docker-setup

  docker-setup:
    build:
      context: ./docker
      dockerfile: Dockerfile.level
    command: ["echo", "Image ready"]

volumes:
  db-data:
