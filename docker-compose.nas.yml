# 绿联 NAS 部署配置（支持自动更新）
#
# 使用方法：
#   1. SSH 登录 NAS
#   2. 创建目录: mkdir -p /volume1/docker/linux-learning && cd /volume1/docker/linux-learning
#   3. 下载此文件: curl -O https://raw.githubusercontent.com/wyc7758775/linux-learning-platform/main/docker-compose.nas.yml
#   4. 启动: docker-compose -f docker-compose.nas.yml up -d
#   5. 访问: http://<NAS-IP>:8080
#
# 自动更新：当你 git push 后，Watchtower 会每 5 分钟检查一次镜像更新，自动拉取并重启

version: '3.8'

services:
  # 自动更新服务 - 监控镜像更新并自动重启容器
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300  # 每 5 分钟检查一次
      - WATCHTOWER_CLEANUP=true       # 清理旧镜像
    restart: unless-stopped

  frontend:
    image: ghcr.io/wyc7758775/linux-learning-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    image: ghcr.io/wyc7758775/linux-learning-backend:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3001
      - NODE_ENV=production
      - CORS_ORIGIN=http://localhost:8080
      - LEVEL_IMAGE_NAME=ghcr.io/wyc7758775/linux-learning-level
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 预拉取关卡镜像
  level-image:
    image: ghcr.io/wyc7758775/linux-learning-level:latest
    restart: "no"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
